---
image: docker.io/nixos/nix:2.24.11

variables:
  NIX_CONFIG: "experimental-features = nix-command flakes"
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/dttr/${CI_COMMIT_TAG}"

.nix-cache:
  cache:
    key:
      files:
        - flake.lock
    paths:
      - .nix-cache
  before_script:
    - |
      if [ -d .nix-cache/store ]; then
        echo "Restoring Nix store from cache..."
        cp -rn .nix-cache/store/* /nix/store/ 2>/dev/null || true
        nix-store --load-db < .nix-cache/db.dump
      fi
  after_script:
    - |
      echo "Saving Nix store to cache..."
      mkdir -p .nix-cache/store
      CACHED_PATHS=$(nix path-info --derivation --recursive .#devShells.x86_64-linux.default 2>/dev/null || true)
      if [ -n "$CACHED_PATHS" ]; then
        echo "$CACHED_PATHS" | xargs -I{} cp -rn {} .nix-cache/store/ 2>/dev/null || true
        nix-store --dump-db $CACHED_PATHS > .nix-cache/db.dump
      fi

stages:
  - build
  - deploy
  - release

build:
  extends: .nix-cache
  stage: build
  script:
    - |
      nix develop --command bash -c '
        set -euo pipefail

        version="${CI_COMMIT_TAG:-dev}"
        task build DTTR_VERSION="${version}"
        task build DTTR_VERSION="${version}" DTTR_MODDING=ON
        for archive_spec in \
          "dttr-${CI_COMMIT_SHORT_SHA}-debug.zip:Debug" \
          "dttr-modding-${CI_COMMIT_SHORT_SHA}-debug.zip:Debug-modding"
        do
          archive="${archive_spec%%:*}"
          dist_name="${archive_spec#*:}"
          (cd build/dist && zip -r "../../${archive}" "${dist_name}/")
        done
      '
  artifacts:
    paths:
      - dttr-*-debug.zip
      - dttr-modding-*-debug.zip
    expire_in: 2 weeks
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_REF_PROTECTED == "true"

build-release:
  extends: .nix-cache
  stage: build
  script:
    - |
      nix develop --command bash -c '
        set -euo pipefail

        task build-release DTTR_VERSION="${CI_COMMIT_TAG}"
        task build-release DTTR_VERSION="${CI_COMMIT_TAG}" DTTR_MODDING=ON
        for archive_spec in \
          "dttr-${CI_COMMIT_TAG}-debug.zip:Debug" \
          "dttr-${CI_COMMIT_TAG}-release.zip:Release" \
          "dttr-modding-${CI_COMMIT_TAG}-debug.zip:Debug-modding" \
          "dttr-modding-${CI_COMMIT_TAG}-release.zip:Release-modding"
        do
          archive="${archive_spec%%:*}"
          dist_name="${archive_spec#*:}"
          (cd build/dist && zip -r "../../${archive}" "${dist_name}/")
          curl --fail --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "${archive}" "${PACKAGE_REGISTRY_URL}/${archive}"
        done
      '
  artifacts:
    paths:
      - dttr-*-debug.zip
      - dttr-*-release.zip
      - dttr-modding-*-debug.zip
      - dttr-modding-*-release.zip
    expire_in: 2 weeks
  rules:
    - if: $CI_COMMIT_TAG

pages:
  extends: .nix-cache
  stage: deploy
  script:
    - nix develop --command task generate-docs
    - rm -rf public
    - cp -r docs/html public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  variables:
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git
  script:
    - |
      prev_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
      if [ -n "$prev_tag" ]; then
        git log --first-parent --no-merges --format="- %s (%h)" "${prev_tag}..HEAD" > changelog.md
      else
        git log --first-parent --no-merges --format="- %s (%h)" > changelog.md
      fi
  needs:
    - job: build-release
      artifacts: false
  release:
    tag_name: $CI_COMMIT_TAG
    description: ./changelog.md
    assets:
      links:
        - name: "dttr-${CI_COMMIT_TAG}-release.zip"
          url: "${PACKAGE_REGISTRY_URL}/dttr-${CI_COMMIT_TAG}-release.zip"
          filepath: "/dttr-${CI_COMMIT_TAG}-release.zip"
          link_type: package
        - name: "dttr-${CI_COMMIT_TAG}-debug.zip"
          url: "${PACKAGE_REGISTRY_URL}/dttr-${CI_COMMIT_TAG}-debug.zip"
          filepath: "/dttr-${CI_COMMIT_TAG}-debug.zip"
          link_type: package
        - name: "dttr-modding-${CI_COMMIT_TAG}-release.zip"
          url: "${PACKAGE_REGISTRY_URL}/dttr-modding-${CI_COMMIT_TAG}-release.zip"
          filepath: "/dttr-modding-${CI_COMMIT_TAG}-release.zip"
          link_type: package
        - name: "dttr-modding-${CI_COMMIT_TAG}-debug.zip"
          url: "${PACKAGE_REGISTRY_URL}/dttr-modding-${CI_COMMIT_TAG}-debug.zip"
          filepath: "/dttr-modding-${CI_COMMIT_TAG}-debug.zip"
          link_type: package
  rules:
    - if: $CI_COMMIT_TAG
