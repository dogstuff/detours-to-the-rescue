---
image: docker.io/nixos/nix:2.24.11

variables:
  NIX_CONFIG: "experimental-features = nix-command flakes"

.nix-cache:
  cache:
    key:
      files:
        - flake.lock
    paths:
      - .nix-cache
  before_script:
    - |
      if [ -d .nix-cache/store ]; then
        echo "Restoring Nix store from cache..."
        cp -rn .nix-cache/store/* /nix/store/ 2>/dev/null || true
        nix-store --load-db < .nix-cache/db.dump
      fi
  after_script:
    - |
      echo "Saving Nix store to cache..."
      mkdir -p .nix-cache/store
      nix-store --dump-db > .nix-cache/db.dump
      nix path-info --derivation --recursive .#devShells.x86_64-linux.default 2>/dev/null \
        | xargs -I{} cp -rn {} .nix-cache/store/ 2>/dev/null || true

stages:
  - build
  - deploy
  - release

build:
  extends: .nix-cache
  stage: build
  script:
    - nix develop --command bash -c "task build DTTR_VERSION=${CI_COMMIT_TAG:-dev} && (cd build/dist && zip -r ../../dttr-${CI_COMMIT_SHORT_SHA}-debug.zip Debug/)"
  artifacts:
    paths:
      - dttr-*-debug.zip
    expire_in: 2 weeks
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH

build-release:
  extends: .nix-cache
  stage: build
  script:
    - nix develop --command bash -c "task build-release DTTR_VERSION=${CI_COMMIT_TAG} && cd build/dist && zip -r ../../dttr-${CI_COMMIT_TAG}-debug.zip Debug/ && zip -r ../../dttr-${CI_COMMIT_TAG}-release.zip Release/"
  artifacts:
    paths:
      - dttr-*-debug.zip
      - dttr-*-release.zip
    expire_in: 2 weeks
  rules:
    - if: $CI_COMMIT_TAG

pages:
  extends: .nix-cache
  stage: deploy
  script:
    - nix develop --command task generate-docs
    - rm -rf public
    - cp -r docs/html public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  variables:
    GIT_DEPTH: 0
  script:
    - apk add --no-cache jq curl
    - |
      PREV_TAG=$(git describe --tags --abbrev=0 HEAD^)
      curl -sf --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests?state=merged&target_branch=${CI_DEFAULT_BRANCH}&updated_after=$(git log -1 --format=%aI "${PREV_TAG}")&per_page=100" \
        | jq -r '.[] | "- \(.title) - [!\(.iid)](\(.web_url)) @\(.author.username)"' > changelog.md
      git log --first-parent --no-merges --format="- %s (%h)" "${PREV_TAG}..HEAD" >> changelog.md
  needs:
    - job: build-release
      artifacts: true
  release:
    tag_name: $CI_COMMIT_TAG
    description: ./changelog.md
    assets:
      links:
        - name: "dttr-${CI_COMMIT_TAG}-release.zip"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/dttr-${CI_COMMIT_TAG}-release.zip"
        - name: "dttr-${CI_COMMIT_TAG}-debug.zip"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/dttr-${CI_COMMIT_TAG}-debug.zip"
  artifacts:
    paths:
      - dttr-*-release.zip
      - dttr-*-debug.zip
  rules:
    - if: $CI_COMMIT_TAG
