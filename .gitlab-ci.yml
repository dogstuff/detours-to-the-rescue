---
image: docker.io/nixos/nix:2.24.11

variables:
  NIX_CONFIG: "experimental-features = nix-command flakes"

stages:
  - build
  - test
  - deploy
  - release

build:
  stage: build
  script:
    - nix develop --command bash -c 'task build DTTR_VERSION=${CI_COMMIT_TAG:-dev} && cd build/dist && zip -r ../../dttr-dist.zip .'
  artifacts:
    paths:
      - dttr-dist.zip
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "push"

test:
  stage: test
  script:
    - nix develop --command task generate-docs
  rules:
    - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH

pages:
  stage: deploy
  script:
    - nix develop --command task generate-docs
    - rm -rf public
    - cp -r docs/html public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Creating release ${CI_COMMIT_TAG}"
  needs:
    - job: build
      artifacts: true
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Release ${CI_COMMIT_TAG}"
    assets:
      links:
        - name: "dttr-${CI_COMMIT_TAG}.zip"
          url: "${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/dttr-dist.zip"
  artifacts:
    paths:
      - dttr-dist.zip
  rules:
    - if: $CI_COMMIT_TAG

